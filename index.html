<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👩‍🍳 요리일기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f3ec;
    --warm-white: #fdfaf5;
    --ink: #1c1714;
    --ink-light: #5a4e44;
    --ink-muted: #9b8f84;
    --terracotta: #c4714a;
    --terracotta-light: #e8a882;
    --sage: #7a9e7e;
    --sage-light: #b5cfb7;
    --butter: #e8c96e;
    --rose: #d4857a;
    --border: #e0d5c8;
    --shadow: rgba(28,23,20,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.7;
  }

  /* HEADER */
  header {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
  }

  .site-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--terracotta);
    letter-spacing: -0.5px;
  }

  .site-subtitle {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--ink-muted);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-input {
    width: 100%;
    padding: 10px 16px 10px 38px;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    background: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--ink-muted); }
  .search-input:focus { border-color: var(--terracotta); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-muted);
    font-size: 15px;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 14px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .filter-btn.active {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: white;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 0;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--ink-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: var(--terracotta);
    border-bottom-color: var(--terracotta);
    font-weight: 500;
  }

  /* MAIN */
  main { padding: 16px; }

  /* RECIPE GRID */
  .recipe-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (min-width: 600px) {
    .recipe-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .recipe-card {
    background: var(--warm-white);
    border-radius: 14px;
    padding: 14px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .recipe-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--terracotta-light);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .recipe-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
  .recipe-card:hover::before { opacity: 1; }

  .card-category {
    font-size: 10px;
    color: var(--terracotta);
    font-weight: 500;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
  }

  .card-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .card-date {
    font-size: 11px;
    color: var(--ink-muted);
    margin-bottom: 6px;
  }

  .card-memo {
    font-size: 11px;
    color: var(--ink-light);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }

  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--cream);
    color: var(--ink-light);
    border: 1px solid var(--border);
  }

  .has-recipe-badge {
    position: absolute;
    top: 10px; right: 10px;
    font-size: 10px;
    background: var(--sage-light);
    color: var(--sage);
    padding: 2px 7px;
    border-radius: 10px;
  }

  /* DIARY LIST */
  .diary-list { display: flex; flex-direction: column; gap: 12px; }

  .diary-card {
    background: var(--warm-white);
    border-radius: 14px;
    padding: 16px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }

  .diary-card:hover { box-shadow: 0 4px 16px var(--shadow); }

  .diary-date {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: var(--terracotta);
    margin-bottom: 6px;
  }

  .diary-preview {
    font-size: 13px;
    color: var(--ink-light);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-muted);
    grid-column: 1 / -1;
  }

  .empty-emoji { font-size: 36px; margin-bottom: 10px; }
  .empty-text { font-size: 14px; }

  /* RESULT COUNT */
  .result-info {
    font-size: 12px;
    color: var(--ink-muted);
    margin-bottom: 12px;
    padding: 0 2px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,23,20,0.5);
    z-index: 200;
    backdrop-filter: blur(4px);
    align-items: flex-end;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    border-radius: 24px 24px 0 0;
    padding: 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }

  .modal-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--warm-white);
    z-index: 10;
  }

  .modal-category {
    font-size: 11px;
    color: var(--terracotta);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .modal-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .modal-date { font-size: 12px; color: var(--ink-muted); }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: var(--cream);
    border: none;
    border-radius: 50%;
    width: 30px; height: 30px;
    font-size: 16px;
    cursor: pointer;
    color: var(--ink-light);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-body { padding: 16px 20px 32px; }

  .modal-memo {
    background: var(--cream);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--ink-light);
    line-height: 1.6;
    margin-bottom: 16px;
    border-left: 3px solid var(--terracotta-light);
  }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    color: var(--ink);
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .ingredient-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .ingredient-chip {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 11px;
    font-size: 12px;
    color: var(--ink-light);
  }

  .step-list { list-style: none; }

  .step-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--ink-light);
    line-height: 1.5;
  }

  .step-item:last-child { border-bottom: none; }

  .step-num {
    flex-shrink: 0;
    width: 22px; height: 22px;
    background: var(--terracotta);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    margin-top: 1px;
  }

  .tip-box {
    background: linear-gradient(135deg, #fef9f0, #fdf3e3);
    border: 1px solid var(--butter);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--ink-light);
    line-height: 1.6;
    margin-top: 16px;
  }

  .tip-label {
    font-size: 11px;
    font-weight: 500;
    color: #c4941a;
    margin-bottom: 4px;
  }

  .no-recipe {
    text-align: center;
    padding: 24px;
    color: var(--ink-muted);
    font-size: 13px;
  }

  /* DIARY MODAL */
  .diary-full {
    font-size: 14px;
    color: var(--ink-light);
    line-height: 1.9;
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="site-title">요리일기</span>
    <span class="site-subtitle">2025.8 — 2026.5</span>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="요리 이름, 재료로 검색..." id="searchInput" oninput="handleSearch()">
  </div>

  <div class="filters" id="filterRow"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('recipe', this)">🍳 레시피</button>
    <button class="tab-btn" onclick="switchTab('diary', this)">📝 일기</button>
  </div>
</header>

<main>
  <div class="result-info" id="resultInfo"></div>

  <div id="recipeView">
    <div class="recipe-grid" id="recipeGrid"></div>
  </div>

  <div id="diaryView" style="display:none;">
    <div class="diary-list" id="diaryList"></div>
  </div>
</main>

<!-- RECIPE MODAL -->
<div class="modal-overlay" id="recipeModal" onclick="closeModal('recipeModal', event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-category" id="modalCategory"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-date" id="modalDate"></div>
      <button class="modal-close" onclick="document.getElementById('recipeModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- DIARY MODAL -->
<div class="modal-overlay" id="diaryModal" onclick="closeModal('diaryModal', event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-date" id="diaryModalDate" style="font-size:15px; color:var(--terracotta); font-family:'DM Serif Display',serif;"></div>
      <button class="modal-close" onclick="document.getElementById('diaryModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <div class="diary-full" id="diaryModalContent"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
  let currentTab = 'recipe';
  let currentFilter = 'all';
  let searchQuery = '';

  const CATEGORY_FILTERS = [
    { key: 'all', label: '전체' },
    { key: '국/찌개', label: '🥣 국/찌개' },
    { key: '스튜', label: '🫙 스튜' },
    { key: '구이/볶음', label: '🔥 구이/볶음' },
    { key: '파스타/면', label: '🍝 파스타/면' },
    { key: '해산물', label: '🐟 해산물' },
    { key: '샐러드/무침', label: '🥗 샐러드' },
    { key: '스프', label: '🍲 스프' },
    { key: '빵/베이킹', label: '🥐 베이킹' },
    { key: '기타/조림', label: '🍱 기타' },
  ];

  const INGREDIENT_FILTERS = [
    { key: 'all', label: '전체' },
    { key: '연어', label: '🐟 연어' },
    { key: '돼지고기', label: '🐷 돼지' },
    { key: '닭', label: '🐔 닭' },
    { key: '양고기', label: '🐑 양고기' },
    { key: '소고기', label: '🐄 소고기' },
    { key: '오징어', label: '🦑 오징어' },
    { key: '채소', label: '🥦 채소' },
    { key: '생선/기타', label: '🐡 생선/기타' },
  ];

  function renderFilters() {
    const filters = currentTab === 'recipe' ? CATEGORY_FILTERS : INGREDIENT_FILTERS;
    const row = document.getElementById('filterRow');
    row.innerHTML = filters.map(f => `
      <button class="filter-btn ${currentFilter === f.key ? 'active' : ''}"
        onclick="setFilter('${f.key}')">${f.label}</button>
    `).join('');
  }

  function setFilter(key) {
    currentFilter = key;
    renderFilters();
    render();
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    currentFilter = 'all';
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('recipeView').style.display = tab === 'recipe' ? '' : 'none';
    document.getElementById('diaryView').style.display = tab === 'diary' ? '' : 'none';
    renderFilters();
    render();
  }

  function handleSearch() {
    searchQuery = document.getElementById('searchInput').value.toLowerCase();
    render();
  }

  function render() {
    if (currentTab === 'recipe') renderRecipes();
    else renderDiary();
  }

  function renderRecipes() {
    let items = DATA.recipes;

    if (currentFilter !== 'all') {
      items = items.filter(r => r.category === currentFilter);
    }

    if (searchQuery) {
      items = items.filter(r =>
        r.name.includes(searchQuery) ||
        r.ingredient?.includes(searchQuery) ||
        r.memo?.includes(searchQuery) ||
        r.tags?.some(t => t.includes(searchQuery)) ||
        r.recipe?.ingredients?.some(i => i.includes(searchQuery))
      );
    }

    document.getElementById('resultInfo').textContent = `${items.length}개의 요리`;

    const grid = document.getElementById('recipeGrid');
    if (items.length === 0) {
      grid.innerHTML = `<div class="empty"><div class="empty-emoji">🥄</div><div class="empty-text">검색 결과가 없어요</div></div>`;
      return;
    }

    grid.innerHTML = items.map(r => `
      <div class="recipe-card" onclick="openRecipeModal(${r.id})">
        ${r.recipe ? '<span class="has-recipe-badge">📖 레시피</span>' : ''}
        <div class="card-category">${r.category}</div>
        <div class="card-name">${r.name}</div>
        <div class="card-date">${r.date}</div>
        <div class="card-memo">${r.memo || ''}</div>
        ${r.tags ? `<div class="card-tags">${r.tags.slice(0,3).map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
      </div>
    `).join('');
  }

  function renderDiary() {
    let items = DATA.diary;

    if (searchQuery) {
      items = items.filter(d =>
        d.content.includes(searchQuery) ||
        d.date.includes(searchQuery)
      );
    }

    document.getElementById('resultInfo').textContent = `${items.length}개의 일기`;

    const list = document.getElementById('diaryList');
    if (items.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-emoji">📝</div><div class="empty-text">검색 결과가 없어요</div></div>`;
      return;
    }

    list.innerHTML = items.map(d => `
      <div class="diary-card" onclick="openDiaryModal('${d.date}')">
        <div class="diary-date">${d.date}</div>
        <div class="diary-preview">${d.content}</div>
      </div>
    `).join('');
  }

  function openRecipeModal(id) {
    const r = DATA.recipes.find(x => x.id === id);
    if (!r) return;

    document.getElementById('modalCategory').textContent = r.category + ' · ' + r.ingredient;
    document.getElementById('modalTitle').textContent = r.name;
    document.getElementById('modalDate').textContent = r.date;

    let body = '';
    if (r.memo) {
      body += `<div class="modal-memo">${r.memo}</div>`;
    }

    if (r.tags && r.tags.length) {
      body += `<div class="card-tags" style="margin-bottom:16px">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
    }

    if (r.recipe) {
      body += `
        <div class="section-title">재료</div>
        <div class="ingredient-list">
          ${r.recipe.ingredients.map(i => `<span class="ingredient-chip">${i}</span>`).join('')}
        </div>
        <div class="section-title">만드는 법</div>
        <ul class="step-list">
          ${r.recipe.steps.map((s, i) => `
            <li class="step-item">
              <span class="step-num">${i+1}</span>
              <span>${s}</span>
            </li>
          `).join('')}
        </ul>
        ${r.recipe.tip ? `
          <div class="tip-box">
            <div class="tip-label">💡 메모</div>
            ${r.recipe.tip}
          </div>
        ` : ''}
      `;
    } else {
      body += `<div class="no-recipe">📝 상세 레시피가 기록되지 않은 요리예요</div>`;
    }

    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('recipeModal').classList.add('open');
  }

  function openDiaryModal(date) {
    const d = DATA.diary.find(x => x.date === date);
    if (!d) return;
    document.getElementById('diaryModalDate').textContent = d.date;
    document.getElementById('diaryModalContent').textContent = d.content;
    document.getElementById('diaryModal').classList.add('open');
  }

  function closeModal(id, e) {
    if (e.target.classList.contains('modal-overlay')) {
      document.getElementById(id).classList.remove('open');
    }
  }

  // INIT
  renderFilters();
  render();
</script>
</body>
</html>
