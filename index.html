<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👩‍🍳 요리일기</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c4714a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="요리일기">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f3ec;
    --warm-white: #fdfaf5;
    --ink: #1c1714;
    --ink-light: #5a4e44;
    --ink-muted: #9b8f84;
    --terracotta: #c4714a;
    --terracotta-light: #e8a882;
    --sage: #7a9e7e;
    --sage-light: #b5cfb7;
    --butter: #e8c96e;
    --gold: #e6b800;
    --border: #e0d5c8;
    --shadow: rgba(28,23,20,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.7; }

  header { background: var(--warm-white); border-bottom: 1px solid var(--border); padding: 20px 20px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px var(--shadow); }
  .header-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
  .site-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--terracotta); letter-spacing: -0.5px; }
  .site-subtitle { font-family: 'Noto Serif KR', serif; font-size: 11px; color: var(--ink-muted); font-weight: 300; }

  .search-wrap { position: relative; margin-bottom: 14px; display: flex; gap: 8px; align-items: center; }
  .search-input-wrap { position: relative; flex: 1; }
  .search-input { width: 100%; padding: 10px 16px 10px 38px; border: 1.5px solid var(--border); border-radius: 24px; background: var(--cream); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--ink); outline: none; transition: border-color 0.2s; }
  .search-input::placeholder { color: var(--ink-muted); }
  .search-input:focus { border-color: var(--terracotta); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-muted); font-size: 15px; }

  /* 즐겨찾기 토글 (검색바 우측) */
  .fav-toggle { flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--cream); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--ink-muted); transition: all 0.18s; padding: 0; }
  .fav-toggle:hover { border-color: var(--gold); color: var(--gold); }
  .fav-toggle.active { background: var(--gold); border-color: var(--gold); color: white; }

  /* 필터 펼치기/접기 토글 (검색바 우측) */
  .filter-toggle { flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--cream); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink-muted); transition: all 0.18s; padding: 0; }
  .filter-toggle:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .filter-toggle.active { background: var(--terracotta); border-color: var(--terracotta); color: #fff; }
  .filter-toggle svg { width: 18px; height: 18px; display: block; pointer-events: none; }

  /* 카드 별 버튼 (우상단) */
  .fav-btn { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; border: none; background: rgba(253,250,245,0.85); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--ink-muted); transition: all 0.15s; z-index: 2; padding: 0; }
  .fav-btn:hover { background: var(--warm-white); transform: scale(1.1); }
  .fav-btn.active { color: var(--gold); }
  /* 별 있을 때 "📖 레시피" 뱃지 위치 살짝 아래로 */
  .recipe-card .has-recipe-badge { top: 42px; }

  .filter-section { margin-bottom: 4px; }
  .filter-label { font-size: 10px; color: var(--ink-muted); letter-spacing: 0.5px; font-weight: 500; margin-bottom: 6px; padding-left: 2px; }
  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }

  .filter-btn { flex-shrink: 0; padding: 5px 13px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--ink-light); cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .filter-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .filter-btn.active { background: var(--terracotta); border-color: var(--terracotta); color: white; }
  .filter-btn.ing:hover { border-color: var(--sage); color: var(--sage); }
  .filter-btn.ing.active { background: var(--sage); border-color: var(--sage); color: white; }
  .filter-btn.fam:hover { border-color: #8a6cad; color: #8a6cad; }
  .filter-btn.fam.active { background: #8a6cad; border-color: #8a6cad; color: white; }

  .tabs { display: flex; border-bottom: 2px solid var(--border); }
  .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--ink-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
  .tab-btn.active { color: var(--terracotta); border-bottom-color: var(--terracotta); font-weight: 500; }

  main { padding: 16px; }

  .active-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .active-filter-chip { font-size: 11px; padding: 3px 10px 3px 8px; border-radius: 20px; background: var(--warm-white); border: 1px solid var(--border); color: var(--ink-light); display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .active-filter-chip.cat { border-color: var(--terracotta-light); color: var(--terracotta); }
  .active-filter-chip.ing { border-color: var(--sage-light); color: var(--sage); }
  .active-filter-chip.fam { border-color: #c0a8d4; color: #8a6cad; }
  .remove { color: var(--ink-muted); font-size: 12px; }

  .result-info { font-size: 12px; color: var(--ink-muted); margin-bottom: 12px; padding: 0 2px; }

  .recipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (min-width: 600px) { .recipe-grid { grid-template-columns: repeat(3, 1fr); } }

  .recipe-card { background: var(--warm-white); border-radius: 14px; padding: 14px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .recipe-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--terracotta-light); opacity: 0; transition: opacity 0.2s; }
  .recipe-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
  .recipe-card:hover::before { opacity: 1; }

  .card-category { font-size: 10px; color: var(--terracotta); font-weight: 500; margin-bottom: 4px; }
  .card-name { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; line-height: 1.4; }
  .card-date { font-size: 11px; color: var(--ink-muted); margin-bottom: 6px; }
  .card-memo { font-size: 11px; color: var(--ink-light); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(--cream); color: var(--ink-light); border: 1px solid var(--border); }
  .ing-tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #eef5ef; color: var(--sage); border: 1px solid var(--sage-light); }
  .has-recipe-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; background: var(--sage-light); color: var(--sage); padding: 2px 7px; border-radius: 10px; }

  .diary-list { display: flex; flex-direction: column; gap: 12px; }
  .diary-card { background: var(--warm-white); border-radius: 14px; padding: 16px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  .diary-card:hover { box-shadow: 0 4px 16px var(--shadow); }
  .diary-date { font-family: 'DM Serif Display', serif; font-size: 13px; color: var(--terracotta); margin-bottom: 6px; }
  .diary-preview { font-size: 13px; color: var(--ink-light); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .empty { text-align: center; padding: 48px 20px; color: var(--ink-muted); grid-column: 1 / -1; }
  .empty-emoji { font-size: 36px; margin-bottom: 10px; }
  .empty-text { font-size: 14px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(28,23,20,0.5); z-index: 200; backdrop-filter: blur(4px); align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--warm-white); border-radius: 24px 24px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .modal-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--warm-white); z-index: 10; }
  .modal-meta { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; }
  .modal-category { font-size: 11px; color: var(--terracotta); font-weight: 500; }
  .modal-ing-badge { font-size: 10px; padding: 1px 8px; border-radius: 10px; background: #eef5ef; color: var(--sage); border: 1px solid var(--sage-light); }
  .modal-title { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .modal-date { font-size: 12px; color: var(--ink-muted); }
  .modal-close { position: absolute; top: 14px; right: 16px; background: var(--cream); border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; color: var(--ink-light); display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 16px 20px 32px; }
  .modal-memo { background: var(--cream); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--ink-light); line-height: 1.6; margin-bottom: 16px; border-left: 3px solid var(--terracotta-light); }
  .section-title { font-family: 'DM Serif Display', serif; font-size: 15px; color: var(--ink); margin-bottom: 10px; margin-top: 20px; }
  .ingredient-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .ingredient-chip { background: var(--cream); border: 1px solid var(--border); border-radius: 20px; padding: 4px 11px; font-size: 12px; color: var(--ink-light); }
  .step-list { list-style: none; }
  .step-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--ink-light); line-height: 1.5; }
  .step-item:last-child { border-bottom: none; }
  .step-num { flex-shrink: 0; width: 22px; height: 22px; background: var(--terracotta); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; margin-top: 1px; }
  .tip-box { background: linear-gradient(135deg, #fef9f0, #fdf3e3); border: 1px solid var(--butter); border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--ink-light); line-height: 1.6; margin-top: 16px; }
  .tip-label { font-size: 11px; font-weight: 500; color: #c4941a; margin-bottom: 4px; }
  .no-recipe { text-align: center; padding: 24px; color: var(--ink-muted); font-size: 13px; }
  .series-list { display: flex; flex-direction: column; gap: 6px; }
  .series-card { background: #f5f0f7; border: 1px solid #c0a8d4; border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
  .series-card:hover { background: #ebe2f1; transform: translateX(2px); }
  .series-name { font-size: 13px; font-weight: 500; color: #5c4378; margin-bottom: 2px; }
  .series-date { font-size: 11px; color: #8a6cad; }
  .diary-full { font-size: 14px; color: var(--ink-light); line-height: 1.9; font-family: 'Noto Serif KR', serif; font-weight: 300; }

  /* 스무디·아이스크림 토글 */
  .treat-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
  .treat-toggle button { flex: 1; padding: 8px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--warm-white); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--ink-light); cursor: pointer; transition: all 0.18s; }
  .treat-toggle button:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .treat-toggle button.active { background: var(--terracotta); border-color: var(--terracotta); color: #fff; }
  .card-category.smoothie { color: var(--sage); }
  .card-category.icecream { color: #c77da0; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="site-title">요리일기</span>
    <span class="site-subtitle">2025.8 — 2026.5</span>
  </div>
  <div class="search-wrap">
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="요리 이름, 재료로 검색..." id="searchInput" oninput="handleSearch()">
    </div>
    <button class="filter-toggle" id="filterToggleBtn" onclick="toggleFilters()" title="필터 펼치기/접기" aria-label="필터 펼치기/접기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="21 4 3 4 10 12.5 10 19 14 21 14 12.5 21 4"/></svg>
    </button>
    <button class="fav-toggle" id="favToggleBtn" onclick="toggleFavFilter()" title="즐겨찾기만 보기" aria-label="즐겨찾기만 보기">★</button>
  </div>
  <div id="recipeFilters">
    <div class="filter-section">
      <div class="filter-label">요리 종류</div>
      <div class="filter-row" id="catFilterRow"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">식재료</div>
      <div class="filter-row" id="ingFilterRow"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">시리즈</div>
      <div class="filter-row" id="familyFilterRow"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('recipe', this)">🍳 레시피</button>
    <button class="tab-btn" onclick="switchTab('diary', this)">📝 일기</button>
    <button class="tab-btn" onclick="switchTab('treats', this)">🥤 스무디·아이스크림</button>
    <a href="ingredients.html" class="tab-btn" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">🛒 식재료</a>
  </div>
</header>

<main>
  <div id="activeFiltersDisplay" class="active-filters"></div>
  <div class="result-info" id="resultInfo"></div>
  <div id="recipeView"><div class="recipe-grid" id="recipeGrid"></div></div>
  <div id="diaryView" style="display:none;">
    <div id="diaryPeriod"></div>
    <div class="diary-list" id="diaryList"></div>
  </div>
  <div id="treatsView" style="display:none;">
    <div class="treat-toggle" id="treatToggle"></div>
    <div class="recipe-grid" id="treatsGrid"></div>
  </div>
</main>

<div class="modal-overlay" id="recipeModal" onclick="closeModal('recipeModal', event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-meta">
        <span class="modal-category" id="modalCategory"></span>
        <span class="modal-ing-badge" id="modalIngBadge"></span>
      </div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-date" id="modalDate"></div>
      <button class="modal-close" onclick="document.getElementById('recipeModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="modal-overlay" id="diaryModal" style="z-index:201;" onclick="closeModal('diaryModal', event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div style="font-size:15px;color:var(--terracotta);font-family:'DM Serif Display',serif;" id="diaryModalDate"></div>
      <button class="modal-close" onclick="document.getElementById('diaryModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body"><div class="diary-full" id="diaryModalContent"></div></div>
  </div>
</div>

<script src="data.js"></script>
<script>
  let currentTab = 'recipe';
  let currentCat = 'all';
  let currentIng = 'all';
  let currentFamily = 'all';
  let currentTreatType = 'smoothie';
  let diaryYear = 'all';
  let diaryMonth = 'all';
  let searchQuery = '';
  let showFavOnly = false;

  // ===== 즐겨찾기 (localStorage) =====
  const FAV_KEY = 'cooking-diary-favorites';
  function loadFavs() {
    try {
      const raw = localStorage.getItem(FAV_KEY);
      return new Set(raw ? JSON.parse(raw) : []);
    } catch { return new Set(); }
  }
  let favorites = loadFavs();
  function saveFavs() {
    localStorage.setItem(FAV_KEY, JSON.stringify([...favorites]));
  }
  function isFav(id) { return favorites.has(id); }
  function toggleFav(id, e) {
    if (e) e.stopPropagation(); // 카드 클릭으로 모달 열리는 거 방지
    if (favorites.has(id)) favorites.delete(id);
    else favorites.add(id);
    saveFavs();
    render();
  }
  function toggleFavFilter() {
    showFavOnly = !showFavOnly;
    const btn = document.getElementById('favToggleBtn');
    btn.classList.toggle('active', showFavOnly);
    btn.title = showFavOnly ? '전체 보기' : '즐겨찾기만 보기';
    render();
  }
  // ===================================

  // ===== 필터 펼치기/접기 (localStorage 기억) =====
  const FILTERS_PREF_KEY = 'cooking-diary-show-filters';
  let showFilters = (() => {
    try { return localStorage.getItem(FILTERS_PREF_KEY) === '1'; } catch { return false; }
  })();
  function applyFilterVisibility() {
    const onRecipe = currentTab === 'recipe';
    document.getElementById('recipeFilters').style.display = (onRecipe && showFilters) ? '' : 'none';
    const btn = document.getElementById('filterToggleBtn');
    btn.style.display = onRecipe ? '' : 'none';
    btn.classList.toggle('active', showFilters);
    btn.title = showFilters ? '필터 접기' : '필터 펼치기';
  }
  function toggleFilters() {
    showFilters = !showFilters;
    try { localStorage.setItem(FILTERS_PREF_KEY, showFilters ? '1' : '0'); } catch {}
    applyFilterVisibility();
  }
  // ===============================================

  const CAT_FILTERS = [
    { key: 'all', label: '전체' },
    { key: '국/찌개', label: '🥣 국/찌개' },
    { key: '스튜', label: '🫙 스튜' },
    { key: '구이/볶음', label: '🔥 구이/볶음' },
    { key: '파스타/면', label: '🍝 파스타/면' },
    { key: '해산물', label: '🐟 해산물' },
    { key: '샐러드/무침', label: '🥗 샐러드' },
    { key: '스프', label: '🍲 스프' },
    { key: '빵/베이킹', label: '🥐 베이킹' },
    { key: '기타/조림', label: '🍱 기타' },
  ];

  const ING_FILTERS = [
    { key: 'all',    label: '전체', keywords: [] },
    { key: '돼지고기', label: '🐷 돼지고기', keywords: [
      '돼지','삼겹','목살','등뼈','앞갈비','앞다리','뒷사태','사태','황제살',
      '돈마호크','잠봉','막창','뒤록','수육','이베리코','부대찌개','김치찜',
      '감자탕','짜글이','누룩소금','흑돼지'
    ]},
    { key: '닭', label: '🐔 닭', keywords: [
      '닭','치킨','찜닭','삼계탕','닭볶음탕','닭윙','닭정육','닭북채',
      '닭가슴살','이북식','텐더'
    ]},
    { key: '소고기', label: '🐄 소고기', keywords: [
      '소고기','차돌','사골','한우','부채살','양지','목초우','목초',
      '양늑간살','양늑'
    ]},
    { key: '양고기', label: '🐑 양고기', keywords: [
      '양고기','양갈비','양늑','양어깨','라구','함박','양념막창','양고기큐브'
    ]},
    { key: '연어',   label: '🐟 연어',   keywords: ['연어'] },
    { key: '장어',   label: '🐍 장어',   keywords: ['장어'] },
    { key: '오징어', label: '🦑 오징어', keywords: ['오징어'] },
    { key: '채소',   label: '🥦 채소',   keywords: [
      '채소','달래','봄동','섬초','무','당근','나물','콩국수','템페','파김치'
    ]},
    { key: '기타해산물', label: '🦐 기타해산물', keywords: ['새우','홍가리비','감바스'] },
    { key: '오리',   label: '🦆 오리',   keywords: ['오리'] },
  ];

  // 시리즈/family 필터 (요리 변형 묶기)
  const FAMILY_FILTERS = [
    { key: 'all',           label: '전체' },
    { key: '감바스',         label: '🍤 감바스' },
    { key: '크림스튜',       label: '🥛 크림스튜' },
    { key: '토마토탕',       label: '🍅 토마토탕' },
    { key: '토마토소스베이스', label: '🍅 토마토베이스' },
    { key: '묵은지찌개',     label: '🥬 묵은지찌개' },
    { key: '수육',           label: '🥩 수육' },
    { key: '봄동요리',       label: '🌱 봄동요리' },
    { key: '라페',           label: '🥕 라페' },
    { key: '장어요리',       label: '🐍 장어요리' },
    { key: '오징어요리',     label: '🦑 오징어요리' },
  ];

  function matchFamily(recipe, key) {
    if (key === 'all') return true;
    return (recipe.family || []).includes(key);
  }

  // 스무디·아이스크림 토글
  const TREAT_TYPES = [
    { key: 'favorites', label: '⭐ 즐겨찾기' },
    { key: 'smoothie',  label: '🥤 스무디' },
    { key: 'icecream',  label: '🍨 아이스크림' },
  ];
  function treatLabel(type) {
    const t = TREAT_TYPES.find(x => x.key === type);
    return t ? t.label : type;
  }

  function matchIng(recipe, key) {
    if (key === 'all') return true;
    const filter = ING_FILTERS.find(f => f.key === key);
    if (!filter || !filter.keywords.length) return false;
    const haystack = [
      recipe.name,
      recipe.memo || '',
      recipe.ingredient || '',
      ...(recipe.tags || []),
      ...(recipe.recipe?.ingredients || []),
      ...(recipe.recipe?.mainIngredients || []),
      ...(recipe.recipe?.seasonings || []),
      ...(recipe.recipe?.steps || []),
    ].join(' ');
    return filter.keywords.some(kw => haystack.includes(kw));
  }

  function getIngLabel(recipe) {
    const matched = ING_FILTERS.find(f => f.key !== 'all' && matchIng(recipe, f.key));
    return matched ? matched.label : '';
  }

  function renderCatFilters() {
    document.getElementById('catFilterRow').innerHTML = CAT_FILTERS.map(f =>
      `<button class="filter-btn ${currentCat === f.key ? 'active' : ''}" onclick="setCat('${f.key}')">${f.label}</button>`
    ).join('');
  }

  function renderIngFilters() {
    document.getElementById('ingFilterRow').innerHTML = ING_FILTERS.map(f =>
      `<button class="filter-btn ing ${currentIng === f.key ? 'active' : ''}" onclick="setIng('${f.key}')">${f.label}</button>`
    ).join('');
  }

  function renderFamilyFilters() {
    document.getElementById('familyFilterRow').innerHTML = FAMILY_FILTERS.map(f =>
      `<button class="filter-btn fam ${currentFamily === f.key ? 'active' : ''}" onclick="setFamily('${f.key}')">${f.label}</button>`
    ).join('');
  }

  function renderActiveChips() {
    const chips = [];
    if (currentCat !== 'all') {
      const f = CAT_FILTERS.find(f => f.key === currentCat);
      chips.push(`<span class="active-filter-chip cat" onclick="setCat('all')">${f.label} <span class="remove">✕</span></span>`);
    }
    if (currentIng !== 'all') {
      const f = ING_FILTERS.find(f => f.key === currentIng);
      chips.push(`<span class="active-filter-chip ing" onclick="setIng('all')">${f.label} <span class="remove">✕</span></span>`);
    }
    if (currentFamily !== 'all') {
      const f = FAMILY_FILTERS.find(f => f.key === currentFamily);
      chips.push(`<span class="active-filter-chip fam" onclick="setFamily('all')">${f.label} <span class="remove">✕</span></span>`);
    }
    document.getElementById('activeFiltersDisplay').innerHTML = chips.join('');
  }

  function setCat(key) { currentCat = key; renderCatFilters(); renderActiveChips(); render(); }
  function setIng(key) { currentIng = key; renderIngFilters(); renderActiveChips(); render(); }
  function setFamily(key) { currentFamily = key; renderFamilyFilters(); renderActiveChips(); render(); }

  function switchTab(tab, btn) {
    currentTab = tab;
    currentCat = 'all'; currentIng = 'all'; currentFamily = 'all'; currentTreatType = 'smoothie'; diaryYear = 'all'; diaryMonth = 'all'; searchQuery = '';
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('recipeView').style.display = tab === 'recipe' ? '' : 'none';
    document.getElementById('diaryView').style.display = tab === 'diary' ? '' : 'none';
    document.getElementById('treatsView').style.display = tab === 'treats' ? '' : 'none';
    // 필터 패널·토글 버튼은 레시피 탭에서만, 펼침 상태 반영
    applyFilterVisibility();
    // 별 토글 버튼은 레시피 탭에서만 표시
    document.getElementById('favToggleBtn').style.display = tab === 'recipe' ? '' : 'none';
    renderCatFilters(); renderIngFilters(); renderFamilyFilters(); renderTreatToggle(); renderDiaryPeriod(); renderActiveChips(); render();
  }

  function renderTreatToggle() {
    document.getElementById('treatToggle').innerHTML = TREAT_TYPES.map(t =>
      `<button class="${currentTreatType === t.key ? 'active' : ''}" onclick="setTreatType('${t.key}')">${t.label}</button>`
    ).join('');
  }
  function setTreatType(key) { currentTreatType = key; renderTreatToggle(); render(); }

  // 일기 기간 토글 (전체 → 연도 → 월 드릴다운)
  function diaryYears() {
    return [...new Set(DATA.diary.map(d => d.date.split('.')[0]))].sort((a, b) => b - a);
  }
  function diaryMonths(year) {
    return [...new Set(DATA.diary
      .filter(d => d.date.split('.')[0] === year)
      .map(d => Number(d.date.split('.')[1])))]
      .sort((a, b) => b - a);
  }
  function renderDiaryPeriod() {
    let html = '<div class="treat-toggle">';
    html += `<button class="${diaryYear === 'all' ? 'active' : ''}" onclick="setDiaryYear('all')">전체</button>`;
    diaryYears().forEach(y => {
      html += `<button class="${diaryYear === y ? 'active' : ''}" onclick="setDiaryYear('${y}')">${y}년</button>`;
    });
    html += '</div>';
    if (diaryYear !== 'all') {
      html += '<div class="filter-row" style="margin-bottom:12px">';
      html += `<button class="filter-btn ${diaryMonth === 'all' ? 'active' : ''}" onclick="setDiaryMonth('all')">${diaryYear}년 전체</button>`;
      diaryMonths(diaryYear).forEach(m => {
        html += `<button class="filter-btn ${diaryMonth === String(m) ? 'active' : ''}" onclick="setDiaryMonth('${m}')">${m}월</button>`;
      });
      html += '</div>';
    }
    document.getElementById('diaryPeriod').innerHTML = html;
  }
  function setDiaryYear(y) { diaryYear = y; diaryMonth = 'all'; renderDiaryPeriod(); render(); }
  function setDiaryMonth(m) { diaryMonth = m; renderDiaryPeriod(); render(); }

  function handleSearch() {
    searchQuery = document.getElementById('searchInput').value;
    render();
  }

  function render() {
    if (currentTab === 'recipe') renderRecipes();
    else if (currentTab === 'diary') renderDiary();
    else renderTreats();
  }

  // "2025.8.18" → Date 객체 (정렬용)
  function parseDate(s) {
    const [y, m, d] = s.split('.').map(Number);
    return new Date(y, m - 1, d);
  }

  function renderRecipes() {
    let items = [...DATA.recipes].sort((a, b) => parseDate(b.date) - parseDate(a.date));
    if (showFavOnly) items = items.filter(r => favorites.has(r.id));
    if (currentCat !== 'all') items = items.filter(r => r.category === currentCat);
    if (currentIng !== 'all') items = items.filter(r => matchIng(r, currentIng));
    if (currentFamily !== 'all') items = items.filter(r => matchFamily(r, currentFamily));
    if (searchQuery) {
      const q = searchQuery;
      // 검색어가 식재료 키워드와 일치하면 해당 식재료 그룹도 포함
      const matchedIngGroups = ING_FILTERS.filter(f =>
        f.key !== 'all' && f.keywords.some(kw => kw.includes(q) || q.includes(kw))
      ).map(f => f.key);

      items = items.filter(r => {
        const allIngs = [...(r.recipe?.mainIngredients || []), ...(r.recipe?.seasonings || []), ...(r.recipe?.ingredients || [])];
        const text = [r.name, r.memo || '', ...(r.tags || []), ...allIngs].join(' ');
        const textMatch = text.includes(q);
        const ingGroupMatch = matchedIngGroups.some(key => matchIng(r, key));
        return textMatch || ingGroupMatch;
      });
    }

    document.getElementById('resultInfo').textContent =
      (showFavOnly ? '⭐ 즐겨찾기 ' : '') + `${items.length}개의 요리`;
    const grid = document.getElementById('recipeGrid');

    if (items.length === 0) {
      const emoji = showFavOnly ? '⭐' : '🥄';
      const msg = showFavOnly ? '즐겨찾기한 요리가 없어요<br><span style="font-size:12px">카드의 별을 눌러 추가해보세요</span>' : '검색 결과가 없어요';
      grid.innerHTML = `<div class="empty"><div class="empty-emoji">${emoji}</div><div class="empty-text">${msg}</div></div>`;
      return;
    }

    grid.innerHTML = items.map(r => `
      <div class="recipe-card" onclick="openRecipeModal(${r.id})">
        <button class="fav-btn ${isFav(r.id) ? 'active' : ''}" onclick="toggleFav(${r.id}, event)" aria-label="즐겨찾기" title="즐겨찾기">${isFav(r.id) ? '★' : '☆'}</button>
        ${r.recipe ? '<span class="has-recipe-badge">📖 레시피</span>' : ''}
        <div class="card-category">${r.category}</div>
        <div class="card-name">${r.name}</div>
        <div class="card-date">${r.date}</div>
        <div class="card-memo">${r.memo || ''}</div>
        <div class="card-tags">
          <span class="ing-tag">${getIngLabel(r)}</span>
          ${(r.tags || []).slice(0,2).map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    `).join('');
  }

  function renderDiary() {
    let items = [...DATA.diary].sort((a, b) => parseDate(b.date) - parseDate(a.date));
    if (diaryYear !== 'all') items = items.filter(d => d.date.split('.')[0] === diaryYear);
    if (diaryMonth !== 'all') items = items.filter(d => Number(d.date.split('.')[1]) === Number(diaryMonth));
    if (searchQuery) items = items.filter(d => d.content.includes(searchQuery) || d.date.includes(searchQuery));
    document.getElementById('resultInfo').textContent = `${items.length}개의 일기`;
    const list = document.getElementById('diaryList');
    if (items.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-emoji">📝</div><div class="empty-text">검색 결과가 없어요</div></div>`;
      return;
    }
    list.innerHTML = items.map(d => `
      <div class="diary-card" onclick="openDiaryModal('${d.date}')">
        <div class="diary-date">${d.date}</div>
        <div class="diary-preview">${d.content}</div>
      </div>
    `).join('');
  }

  function renderTreats() {
    const favView = currentTreatType === 'favorites';
    let items = [...(DATA.treats || [])];
    items = favView ? items.filter(t => isFav(t.id)) : items.filter(t => t.type === currentTreatType);
    if (searchQuery) {
      const q = searchQuery;
      items = items.filter(t => {
        const text = [t.name, t.memo || '', ...(t.tags || []), ...(t.recipe?.ingredients || []), ...(t.recipe?.steps || [])].join(' ');
        return text.includes(q);
      });
    }
    document.getElementById('resultInfo').textContent =
      (favView ? '⭐ 즐겨찾기 ' : '') + `${items.length}개의 레시피`;
    const grid = document.getElementById('treatsGrid');
    if (items.length === 0) {
      const emoji = favView ? '⭐' : '🥤';
      const msg = favView
        ? '즐겨찾기한 레시피가 없어요<br><span style="font-size:12px">카드의 별을 눌러 추가해보세요</span>'
        : '아직 기록된 레시피가 없어요';
      grid.innerHTML = `<div class="empty"><div class="empty-emoji">${emoji}</div><div class="empty-text">${msg}</div></div>`;
      return;
    }
    grid.innerHTML = items.map(t => `
      <div class="recipe-card" onclick="openTreatModal('${t.id}')">
        <button class="fav-btn ${isFav(t.id) ? 'active' : ''}" onclick="toggleFav('${t.id}', event)" aria-label="즐겨찾기" title="즐겨찾기">${isFav(t.id) ? '★' : '☆'}</button>
        <span class="has-recipe-badge">📖 레시피</span>
        <div class="card-category ${t.type}">${treatLabel(t.type)}</div>
        <div class="card-name">${t.name}</div>
        ${t.date ? `<div class="card-date">${t.date}</div>` : ''}
        <div class="card-memo">${t.memo || ''}</div>
        <div class="card-tags">${(t.tags || []).slice(0, 3).map(x => `<span class="tag">${x}</span>`).join('')}</div>
      </div>
    `).join('');
  }

  function openTreatModal(id) {
    const t = (DATA.treats || []).find(x => x.id === id);
    if (!t) return;
    document.getElementById('modalCategory').textContent = treatLabel(t.type);
    document.getElementById('modalIngBadge').textContent = '';
    document.getElementById('modalTitle').textContent = t.name;
    document.getElementById('modalDate').textContent = t.date || '';

    let body = '';
    if (t.memo) body += `<div class="modal-memo">${t.memo}</div>`;
    if (t.tags?.length) body += `<div class="card-tags" style="margin-bottom:16px">${t.tags.map(x => `<span class="tag">${x}</span>`).join('')}</div>`;

    const rc = t.recipe || {};
    if (rc.ingredients?.length) {
      body += `
        <div class="section-title">🧺 재료</div>
        <div class="ingredient-list">${rc.ingredients.map(i => `<span class="ingredient-chip">${i}</span>`).join('')}</div>`;
    }
    if (rc.setting) {
      body += `
        <div class="section-title">⚙️ 기기 · 모드</div>
        <div class="modal-memo" style="border-left-color:var(--sage)">${rc.setting}</div>`;
    }
    if (rc.steps?.length) {
      body += `
        <div class="section-title">만드는 법</div>
        <ul class="step-list">${rc.steps.map((s, i) => `<li class="step-item"><span class="step-num">${i + 1}</span><span>${s}</span></li>`).join('')}</ul>`;
    }
    if (rc.tip) body += `<div class="tip-box"><div class="tip-label">💡 메모</div>${rc.tip}</div>`;

    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('recipeModal').classList.add('open');
  }

  function openRecipeModal(id) {
    const r = DATA.recipes.find(x => x.id === id);
    if (!r) return;
    document.getElementById('modalCategory').textContent = r.category;
    document.getElementById('modalIngBadge').textContent = getIngLabel(r);
    document.getElementById('modalTitle').textContent = r.name;

    // 날짜 + 일기 바로가기 버튼
    const hasDiary = DATA.diary.some(d => d.date === r.date);
    document.getElementById('modalDate').innerHTML = r.date +
      (hasDiary ? ` <button onclick="jumpToDiary('${r.date}')" style="margin-left:8px;font-size:11px;padding:2px 9px;border-radius:10px;border:1px solid var(--terracotta-light);background:transparent;color:var(--terracotta);cursor:pointer;">📝 일기 보기</button>` : '');

    let body = '';
    if (r.memo) body += `<div class="modal-memo">${r.memo}</div>`;
    if (r.tags?.length) body += `<div class="card-tags" style="margin-bottom:16px">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;

    if (r.recipe) {
      const mainIng = r.recipe.mainIngredients || r.recipe.ingredients || [];
      const seasonings = r.recipe.seasonings || [];
      body += `
        ${mainIng.length ? `
          <div class="section-title">🥘 주재료</div>
          <div class="ingredient-list">${mainIng.map(i => `<span class="ingredient-chip" style="background:#fef3eb;border-color:#e8a882;color:#9c5a3a">${i}</span>`).join('')}</div>
        ` : ''}
        ${seasonings.length ? `
          <div class="section-title">🧂 양념</div>
          <div class="ingredient-list">${seasonings.map(i => `<span class="ingredient-chip">${i}</span>`).join('')}</div>
        ` : ''}
        <div class="section-title">만드는 법</div>
        <ul class="step-list">${r.recipe.steps.map((s,i) => `<li class="step-item"><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}</ul>
        ${r.recipe.tip ? `<div class="tip-box"><div class="tip-label">💡 메모</div>${r.recipe.tip}</div>` : ''}
      `;
    } else {
      body += `<div class="no-recipe">📝 상세 레시피가 기록되지 않은 요리예요</div>`;
    }

    // 같은 시리즈 (family) 섹션
    if (r.family?.length) {
      const seriesItems = [];
      const seen = new Set([r.id]);
      r.family.forEach(fam => {
        DATA.recipes.forEach(other => {
          if (seen.has(other.id)) return;
          if ((other.family || []).includes(fam)) {
            seen.add(other.id);
            seriesItems.push({ recipe: other, via: fam });
          }
        });
      });
      if (seriesItems.length) {
        const famLabels = r.family.map(f => {
          const ff = FAMILY_FILTERS.find(x => x.key === f);
          return ff ? ff.label : f;
        }).join(' · ');
        body += `
          <div class="section-title">🔗 같은 시리즈 <span style="font-size:11px;font-weight:300;color:var(--ink-muted);">${famLabels}</span></div>
          <div class="series-list">
            ${seriesItems.map(s => `
              <div class="series-card" onclick="document.getElementById('recipeModal').classList.remove('open');setTimeout(()=>openRecipeModal(${s.recipe.id}),100);">
                <div class="series-name">${s.recipe.name}</div>
                <div class="series-date">${s.recipe.date} · ${s.recipe.category}</div>
              </div>
            `).join('')}
          </div>
        `;
      }
    }

    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('recipeModal').classList.add('open');
  }

  function jumpToDiary(date) {
    // 레시피 모달은 그대로 두고, 일기 모달만 위에 띄운다.
    // 일기 모달을 닫으면 자연스럽게 레시피 모달로 돌아감.
    openDiaryModal(date);
  }

  function openDiaryModal(date) {
    const d = DATA.diary.find(x => x.date === date);
    if (!d) return;
    document.getElementById('diaryModalDate').textContent = d.date;
    document.getElementById('diaryModalContent').textContent = d.content;
    document.getElementById('diaryModal').classList.add('open');
  }

  function closeModal(id, e) {
    if (e.target.classList.contains('modal-overlay')) document.getElementById(id).classList.remove('open');
  }

  renderCatFilters();
  renderIngFilters();
  renderFamilyFilters();
  applyFilterVisibility();
  render();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
